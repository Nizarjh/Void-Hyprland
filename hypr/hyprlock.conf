source = /home/fraggi/.cache/wal/colors-hyprland.conf

background {
    monitor =
    path =  /home/fraggi/.cache/wal/target_wallpaper.png
    color = $background
    blur_passes = 1 # 0 disables blurring
    blur_size = 7

    noise = 0.0117
    contrast = 1.0
    brightness = 0.6
    vibrancy = 0.5
    vibrancy_darkness = 0.1
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $color4
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = $foreground
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    check_color = $color6
    fail_color = $color1
}

label {
    monitor =
    text = $TIME
    color = $foreground
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
